<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — TripTour</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand" onclick="location.href='index.html'" style="cursor:pointer">✈️ <span>Trip</span>Tour</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="tours.html">Tours</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-auth">
        <button class="btn-outline-nav" onclick="location.href='login.html'">Log In</button>
        <button class="btn-solid-nav"   onclick="location.href='register.html'">Sign Up</button>
    </div>
  </nav>

  <!-- Auth -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">✈️</div>
      <h2>Welcome Back</h2>
      <p class="sub">Log in to manage your bookings and wishlist</p>

      <form method="POST" action="login.php">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="your username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">
            Password
            <a href="#" style="float:right; font-size:.8rem; color:var(--primary); font-weight:500">Forgot password?</a>
          </label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div style="display:flex; align-items:center; gap:.5rem; margin-bottom:.5rem;">
          <input type="checkbox" id="remember" style="width:auto; accent-color:var(--primary)">
          <label for="remember" style="font-size:.88rem; color:var(--muted); font-weight:400; margin:0; cursor:pointer">Remember me for 30 days</label>
        </div>

        <button type="submit" class="btn-full">Log In</button>
      </form>

      <div class="divider">or continue with</div>

      <div style="display:flex; gap:.7rem;">
        <button onclick="alert('Google sign-in coming soon!')" style="flex:1; display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.65rem; border:1.5px solid var(--border); border-radius:9px; background:var(--white); cursor:pointer; font-size:.9rem; font-weight:600; color:var(--text); transition:background .15s;" onmouseover="this.style.background='var(--sky)'" onmouseout="this.style.background='var(--white)'">
          <span>🌐</span> Google
        </button>
        <button onclick="alert('Facebook sign-in coming soon!')" style="flex:1; display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.65rem; border:1.5px solid var(--border); border-radius:9px; background:var(--white); cursor:pointer; font-size:.9rem; font-weight:600; color:var(--text); transition:background .15s;" onmouseover="this.style.background='var(--sky)'" onmouseout="this.style.background='var(--white)'">
          <span>📘</span> Facebook
        </button>
      </div>

      <p class="auth-switch">Don't have an account? <a href="register.html">Sign up free</a></p>
    </div>
  </div>

  <footer>
    <strong>TripTour</strong> &copy; 2026 — Crafted with ❤️ for adventurous souls
  </footer>

  <script src="script.js"></script>
</body>
</html>
