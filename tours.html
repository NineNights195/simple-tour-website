<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Tours — TripTour</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand" onclick="location.href='index.html'" style="cursor:pointer">✈️ <span>Trip</span>Tour</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="tours.html" class="active">Tours</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-auth">
      <button class="btn-outline-nav" onclick="location.href='login.html'">Log In</button>
      <button class="btn-solid-nav"   onclick="location.href='register.html'">Sign Up</button>
    </div>
  </nav>

  <!-- Page Hero -->
  <section class="page-hero">
    <h1>All Tours</h1>
    <p>Browse our full collection of handcrafted travel experiences</p>
  </section>

  <!-- Tours -->
  <main class="section">

    <!-- Search -->
    <div style="margin-bottom:1.4rem">
      <input
        type="text"
        id="tourSearch"
        placeholder="🔍  Search by destination, tour name, or category…"
        style="width:100%; padding:.8rem 1.1rem; border:1.5px solid var(--border); border-radius:10px; font-size:.97rem; background:var(--white); color:var(--text); outline:none; transition:border-color .18s, box-shadow .18s;"
        onfocus="this.style.borderColor='var(--primary-l)'; this.style.boxShadow='0 0 0 3px rgba(56,189,248,.2)'"
        onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'"
      >
    </div>

    <!-- Category chips -->
    <div class="category-bar" id="categoryBar">
      <button class="chip active" data-cat="All">All</button>
      <button class="chip" data-cat="Northern">🧭 Northern</button>
      <button class="chip" data-cat="Western">🌊 Western</button>
      <button class="chip" data-cat="Central">🏙️ Central</button>
      <button class="chip" data-cat="Southern">🌴 Southern</button>
    </div>

    <!-- Tours list -->
    <div class="tours-list" id="toursList"></div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="tourModal" role="dialog" aria-modal="true">
    <div class="modal">
      <img class="modal-img" id="modal-img" src="" alt="">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title-wrap">
            <h2 class="modal-title" id="modal-title"></h2>
            <p class="modal-location" id="modal-location"></p>
          </div>
          <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
        </div>
        <div class="modal-tags" id="modal-tags"></div>
        <p class="modal-body" id="modal-body"></p>
        <div class="modal-info-grid" id="modal-info"></div>
        <div class="modal-highlights">
          <h4>Tour Highlights</h4>
          <ul id="modal-highlights"></ul>
        </div>
        <div class="modal-footer">
          <div class="modal-price" id="modal-price"></div>
          <button class="btn-book" id="modal-book-btn">Book Now</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <strong>TripTour</strong> &copy; 2026 — Crafted with ❤️ for adventurous souls
  </footer>

  <script src="script.js"></script>
  <script>
    renderTours("toursList");
    initChips("categoryBar", "toursList");
    initSearch("tourSearch", "toursList");
  </script>
</body>
</html>
